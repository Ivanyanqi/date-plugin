<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mobile Sheet Layout Tests</title>
  <link rel="stylesheet" type="text/css" href="../../date.style.css">
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      min-height: 100vh;
    }

    .stage {
      padding: 24px;
    }

    .summary {
      font-weight: bold;
      margin: 24px;
      margin-bottom: 12px;
    }

    .pass {
      color: #12663a;
    }

    .fail {
      color: #a12622;
    }

    li {
      margin-bottom: 8px;
    }

    #results {
      margin: 0 24px 24px;
    }
  </style>
</head>
<body>
  <div class="stage">
    <input type="text" id="mobile-input" aria-label="mobile input">
  </div>
  <div id="summary" class="summary">Running checks...</div>
  <ol id="results"></ol>

  <script type="module">
    import { DatePicker } from "../../src/index.js";

    var input = document.getElementById("mobile-input");
    var summary = document.getElementById("summary");
    var results = document.getElementById("results");
    var failures = 0;
    var restoreFns = [];

    function logResult(name, passed, details) {
      var item = document.createElement("li");
      item.className = passed ? "pass" : "fail";
      item.textContent = (passed ? "PASS: " : "FAIL: ") + name + " - " + details;
      results.appendChild(item);
      if (!passed) {
        failures++;
      }
    }

    function assert(name, condition, details) {
      logResult(name, !!condition, details);
    }

    function wait(ms) {
      return new Promise(function (resolve) {
        setTimeout(resolve, ms);
      });
    }

    function overrideProperty(target, key, value) {
      var descriptor = Object.getOwnPropertyDescriptor(target, key);
      Object.defineProperty(target, key, {
        configurable: true,
        get: function () {
          return value;
        }
      });
      restoreFns.push(function () {
        if (descriptor) {
          Object.defineProperty(target, key, descriptor);
        } else {
          delete target[key];
        }
      });
    }

    try {
      overrideProperty(window, "innerWidth", 390);
      overrideProperty(window, "innerHeight", 760);
      overrideProperty(document.documentElement, "clientWidth", 390);
      overrideProperty(document.documentElement, "clientHeight", 760);

      var picker = new DatePicker(input, {
        showToday: true,
        showClear: true
      });

      await picker.ready;
      await picker.open();
      window.dispatchEvent(new Event("resize"));
      await wait(1000);

      var wrapper = document.querySelector(".date-plugin-ui-warpper-show");
      var footer = wrapper.querySelector(".date-plugin-ui-footer");
      var buttons = wrapper.querySelectorAll(".date-plugin-action-btn");
      var wrapperRect = wrapper.getBoundingClientRect();
      var firstButtonRect = buttons[0].getBoundingClientRect();
      var secondButtonRect = buttons[1].getBoundingClientRect();

      assert(
        "mobile viewport should switch the panel into sheet mode",
        wrapper.getAttribute("data-mobile") === "true" &&
          wrapper.getAttribute("data-placement") === "sheet",
        "expected mobile metadata to mark the panel as a bottom sheet"
      );

      assert(
        "sheet mode should anchor to the viewport edges near the bottom",
        wrapper.style.position === "fixed" &&
          wrapper.style.left === "8px" &&
          wrapper.style.right === "8px" &&
          wrapper.style.bottom === "8px" &&
          wrapperRect.left <= 12,
        "expected sheet to pin itself to the viewport edges with fixed bottom spacing"
      );

      assert(
        "footer buttons should stretch across the sheet layout",
        footer &&
          buttons.length === 2 &&
          Math.abs(firstButtonRect.width - secondButtonRect.width) <= 1 &&
          firstButtonRect.width > 120,
        "expected Today and Clear buttons to share the footer width"
      );
    } catch (error) {
      logResult("Mobile sheet test bootstrap completed", false, error.message);
    } finally {
      while (restoreFns.length) {
        restoreFns.pop()();
      }
    }

    summary.textContent = failures === 0 ? "All checks passed." : failures + " check(s) failed.";
    summary.className = "summary " + (failures === 0 ? "pass" : "fail");
  </script>
</body>
</html>
