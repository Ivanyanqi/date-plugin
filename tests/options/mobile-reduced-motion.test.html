<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mobile Reduced Motion Tests</title>
  <link rel="stylesheet" type="text/css" href="../../date.style.css">
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      min-height: 100vh;
    }

    .stage {
      padding: 24px;
    }

    .summary {
      font-weight: bold;
      margin: 24px;
      margin-bottom: 12px;
    }

    .pass {
      color: #12663a;
    }

    .fail {
      color: #a12622;
    }

    li {
      margin-bottom: 8px;
    }

    #results {
      margin: 0 24px 24px;
    }
  </style>
</head>
<body>
  <div class="stage">
    <input type="text" id="mobile-input" aria-label="mobile input">
  </div>
  <div id="summary" class="summary">Running checks...</div>
  <ol id="results"></ol>

  <script type="module">
    import { DatePicker } from "../../src/index.js";

    var input = document.getElementById("mobile-input");
    var summary = document.getElementById("summary");
    var results = document.getElementById("results");
    var failures = 0;
    var restoreFns = [];

    function logResult(name, passed, details) {
      var item = document.createElement("li");
      item.className = passed ? "pass" : "fail";
      item.textContent = (passed ? "PASS: " : "FAIL: ") + name + " - " + details;
      results.appendChild(item);
      if (!passed) {
        failures++;
      }
    }

    function assert(name, condition, details) {
      logResult(name, !!condition, details);
    }

    function wait(ms) {
      return new Promise(function (resolve) {
        setTimeout(resolve, ms);
      });
    }

    function overrideProperty(target, key, value) {
      var descriptor = Object.getOwnPropertyDescriptor(target, key);
      Object.defineProperty(target, key, {
        configurable: true,
        get: function () {
          return value;
        }
      });
      restoreFns.push(function () {
        if (descriptor) {
          Object.defineProperty(target, key, descriptor);
        } else {
          delete target[key];
        }
      });
    }

    try {
      overrideProperty(window, "innerWidth", 390);
      overrideProperty(window, "innerHeight", 760);
      overrideProperty(document.documentElement, "clientWidth", 390);
      overrideProperty(document.documentElement, "clientHeight", 760);
      var originalMatchMedia = window.matchMedia;
      window.matchMedia = function (query) {
        return {
          matches: query === "(prefers-reduced-motion: reduce)",
          media: query,
          addEventListener: function () {},
          removeEventListener: function () {},
          addListener: function () {},
          removeListener: function () {},
          onchange: null,
          dispatchEvent: function () {
            return false;
          }
        };
      };
      restoreFns.push(function () {
        window.matchMedia = originalMatchMedia;
      });

      var picker = new DatePicker(input, {
        showToday: true,
        showClear: true
      });

      await picker.ready;
      await picker.open();
      window.dispatchEvent(new Event("resize"));
      await wait(20);

      var wrapper = document.querySelector(".date-plugin-ui-warpper-show");
      var overlay = document.querySelector(".date-plugin-backdrop-show");

      assert(
        "reduced motion should expose motion metadata and skip opening transition state",
        wrapper &&
          overlay &&
          wrapper.getAttribute("data-reduced-motion") === "true" &&
          overlay.getAttribute("data-reduced-motion") === "true" &&
          wrapper.getAttribute("data-open-state") === "open" &&
          overlay.getAttribute("data-open-state") === "open",
        "expected reduced-motion mode to open directly into the settled state"
      );

      overlay.click();
      await wait(20);

      assert(
        "reduced motion should close immediately without a closing animation hold",
        document.querySelectorAll(".date-plugin-ui-warpper-show").length === 0 &&
          document.querySelectorAll(".date-plugin-backdrop-show").length === 0 &&
          document.body.style.overflow === "",
        "expected reduced-motion mode to skip the delayed closing phase"
      );
    } catch (error) {
      logResult("Reduced motion test bootstrap completed", false, error.message);
    } finally {
      while (restoreFns.length) {
        restoreFns.pop()();
      }
    }

    summary.textContent = failures === 0 ? "All checks passed." : failures + " check(s) failed.";
    summary.className = "summary " + (failures === 0 ? "pass" : "fail");
  </script>
</body>
</html>
